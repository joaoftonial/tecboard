<!doctype html>
<!-- define que o documento é HTML5 -->
<html lang="pt-br">
  <head>
    <!-- configura caracteres e responsividade -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- nome da aba -->
    <title>Tecboard</title>
    <!-- chama o CSS da página -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- topo com a logo -->
    <header>
      <img
        src="img/logo-tecboard-branco.webp"
        alt="Logo do Tecboard App na cor branca"
      />
    </header>

    <!-- conteúdo principal -->
    <main>
      <section>
        <!-- título de destaque -->
        <h1>
          <span>Fique de olho</span>
          <br />no que importa
        </h1>

        <!-- texto explicando o produto -->
        <p>
          Monitoramento em tempo real com alertas inteligentes para sua
          <span>aplicação</span> nunca sair do ar sem você saber.
        </p>

        <!-- botão para testar demo -->
        <a href="#" title="Teste a versão demo do App Tecboard"
          >Testar versão demo</a
        >

        <!-- imagem principal do app -->
        <img
          src="img/celulares-sobrespostos-desktop.webp"
          alt="Tela do App Tecboard em dois celulares pretos sobrepostos, com destaque para o hub de eventos de tecnologia."
        />
      </section>
    </main>
  </body>
</html>
